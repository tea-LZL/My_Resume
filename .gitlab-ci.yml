stages:
  - build
  - deploy

variables:
  BUN_VERSION: "1"

build:
  stage: build
  image: oven/bun:${BUN_VERSION}
  rules:
    - if: $CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_REF_NAME =~ /^(develop|uat|master)$/
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME =~ /^(develop|uat|master)$/
  script:
    - bun ci
    - |
      case "${CI_COMMIT_REF_NAME}" in
        develop) build_config=prelive ;;
        uat) build_config=uat ;;
        master) build_config=production ;;
        *) echo "Unsupported branch ${CI_COMMIT_REF_NAME}"; exit 1 ;;
      esac
    - sed -i 's/{{OPENWEATHER_API_KEY}}/'"${OPENWEATHER_API_KEY}"'/g' src/environments/environment.ts
    - bun run build --configuration ${build_config}
  artifacts:
    paths:
      - dist/
    expire_in: 1 hour

deploy:
  stage: deploy
  image: oven/bun:${BUN_VERSION}
  rules:
    - if: $CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_REF_NAME =~ /^(develop|uat|master)$/
  needs:
    - build
  before_script:
    - apt-get update -qq && apt-get install -y -qq git
  script:
    - git clone --branch ${CI_COMMIT_REF_NAME} https://gitlab-ci-token:${API_PUBLISH_TOKEN}@gitlab.com/tea-LZL/My_Resume_Publish.git ./publish
    - cp -a ./dist/project_personal/. ./publish
    - cd ./publish
    - git config user.email "zhilong.k.liang@proton.me"
    - git config user.name "tea-bot"
    - git add .
    - git commit -m "Publish - Auto Publish" --allow-empty
    - git push
