<div class="w-100 navbar-wrapper" [class.navbar-wrapper--scrolled]="isScrolled">
    <div>
        <nav class="navbar navbar-expand-xxl" [class.rounded]="!isScrolled" [class.shadow]="!isScrolled" [class.shadow-sm]="isScrolled">
            <div class="container-fluid">
                <a class="navbar-brand home-ani text-light-emphasis font-plaster" routerLink="/" tabindex="1"
                    role="button"><i class="bi bi-grid-fill me-1"></i>Zhilong Liang</a>
                <div id="nav-icon" class="navbar-toggler border-0" (click)="bNav = !bNav; openNavModal()"
                    (keyup)="bNav = !bNav" tabindex="2" role="button" aria-controls="navbarsCollapse"
                    [ngClass]="{'open':bNav}" aria-expanded="false" aria-label="Toggle navigation">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
                <div class="collapse navbar-collapse" id="navbarsCollapse">
                    <ul class="navbar-nav mb-2 mb-lg-0">
                        <li class="nav-item m-1 dropdown-center">
                            <button class="border-0 rounded px-3 btn btn-outline-primary" tabindex="3" routerLink="/"
                                routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" appMagneticHover>
                                <i class="bi bi-house-fill me-1"></i>Home</button>
                        </li>
                    </ul>
                    <ul class="navbar-nav mb-2 mb-lg-0">
                        <li class="nav-item m-1 dropdown-center">
                            <button class="border-0 rounded px-3  btn btn-outline-primary" tabindex="4"
                                routerLink="/projects" routerLinkActive="active" appMagneticHover>
                                <i class="bi bi-terminal-fill me-1"></i>Projects</button>
                        </li>
                    </ul>
                    <ul class="navbar-nav mb-2 mb-lg-0">
                        <li class="nav-item m-1 dropdown-center">
                            <button class="border-0 rounded px-3  btn btn-outline-primary" tabindex="4"
                                routerLink="/resume" routerLinkActive="active" appMagneticHover>
                                <i class="bi bi-file-earmark-person me-1"></i>Resume</button>
                        </li>
                    </ul>
                    <span class="mx-auto"></span>
                    <a class="me-lg-3 px-3 border-0 navbar-nav text-light-emphasis btn btn-bd-linkedin"
                        href="https://www.linkedin.com/in/zhilong-liang-748b641a1" target="_blank" appMagneticHover><i
                            class="bi bi-linkedin"></i></a>
                    <a class="me-lg-3 px-3 border-0 navbar-nav text-light-emphasis btn btn-bd-github"
                        href="https://github.com/tea-LZL" target="_blank" appMagneticHover><i class="bi bi-github"></i></a>
                    <div class="dropdown navbar-nav">
                        <button
                            class="btn btn-outline-primary border-0 py-2 dropdown-toggle d-flex align-items-center text-light-emphasis align-self-center"
                            id="bd-theme" type="button" aria-expanded="false" data-bs-toggle="dropdown"
                            aria-label="Toggle theme (auto)">
                            <i class="bi"
                                [ngClass]="{'bi-circle-half':theme === 'auto','bi-moon-stars-fill':theme === 'dark','bi-sun-fill':theme === 'light'}"></i>
                            <span class="visually-hidden" id="bd-theme-text">Toggle theme</span>
                        </button>
                        <ul class="dropdown-menu dropdown-menu-end shadow border-0" aria-labelledby="bd-theme-text">
                            <li class="py-1 px-3">
                                <button type="button"
                                    class="dropdown-item rounded-pill d-flex align-items-center justify-content-center"
                                    [ngClass]="{'active':theme === 'light'}" (click)="setTheme('light')">
                                    <i class="bi bi-sun-fill me-2"></i>Light
                                </button>
                            </li>
                            <li class="py-1 px-3">
                                <button type="button"
                                    class="dropdown-item rounded-pill d-flex align-items-center justify-content-center"
                                    [ngClass]="{'active':theme === 'dark'}" (click)="setTheme('dark')">
                                    <i class="bi bi-moon-stars-fill me-2"></i>Dark
                                </button>
                            </li>
                            <li class="py-1 px-3">
                                <button type="button"
                                    class="dropdown-item rounded-pill d-flex align-items-center justify-content-center"
                                    [ngClass]="{'active':theme === 'auto'}" (click)="setTheme('auto')">
                                    <i class="bi bi-circle-half me-2"></i>Auto
                                </button>
                            </li>
                        </ul>
                    </div>
                </div>
            </div>
        </nav>
    </div>
</div>
