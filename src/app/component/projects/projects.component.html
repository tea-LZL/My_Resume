<div class="container py-5">
  <div class="row g-4">
    @for (proj of arrProjects; track proj) {
      <div class="col-12">
        <div class="project-card card flex-lg-row align-items-stretch overflow-hidden">
          <div class="project-card-img-wrapper">
            @for (imgUrl of proj.Cover_Image_URLs; track imgUrl; let i = $index) {
              <div class="project-card-img-container" (click)="openImage(imgUrl)" role="button">
                <img
                  [src]="imgUrl"
                  [alt]="proj.Title + ' ' + (i + 1)"
                  class="project-card-img"
                />
              </div>
            }
          </div>
          <div class="project-card-body card-body d-flex flex-column p-4 p-lg-5">
            <h3 class="project-card-title mb-2">{{ proj.Title }}</h3>
            <p class="project-card-subtitle text-muted mb-3">{{ proj.ShortDescription }}</p>
            <p class="project-card-description mb-4">{{ proj.Description }}</p>
            <div class="mt-auto">
              <a
                class="btn btn-primary"
                [href]="proj.GitHub_Link"
                target="_blank"
                rel="noopener noreferrer"
              >
                <i class="bi bi-github me-2"></i>View on GitHub
              </a>
            </div>
          </div>
        </div>
      </div>
    }
  </div>
</div>

<app-image-lightbox #imageLightbox></app-image-lightbox>
